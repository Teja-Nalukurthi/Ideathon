server.port=8082

# Sibling backend port — used by NetworkInfoController to build backendUrl for QR code
backend.port=8081

# SQLite database stored locally — never leaves the machine
spring.datasource.url=jdbc:sqlite:${user.home}/nidhi-bank.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Internal secret for backend → bank server calls
bank.internal.secret=nidhi-internal-secret-2026

# Security backend base URL (for verifying transactions)
security.backend.url=http://localhost:8081

logging.level.com.nidhi.bank=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
